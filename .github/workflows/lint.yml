name: Lint

on:
  push:
    branches: [main]
    paths: ["*.py", "ci/**", ".github/workflows/lint.yml"]
  pull_request:
    paths: ["*.py", "ci/**", ".github/workflows/lint.yml"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 ci/lint.py
